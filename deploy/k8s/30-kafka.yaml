# Kafka(KRaft, 단일 노드) — 푸시 팬아웃/이벤트용. PVC 로 로그 영속.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-data
  namespace: onebite
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: onebite
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: kafka }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      securityContext:
        fsGroup: 1000          # PVC 디렉터리 소유권(apache/kafka 는 uid 1000)
      containers:
        - name: kafka
          image: apache/kafka:3.8.0
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@kafka:9093" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }  # 같은 ns 내부 접근명
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0" }
            - { name: KAFKA_LOG_DIRS, value: "/var/lib/kafka/data" }
          ports:
            - containerPort: 9092
            - containerPort: 9093
          volumeMounts:
            - { name: data, mountPath: /var/lib/kafka/data }
          readinessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: kafka-data }
---
apiVersion: v1
kind: Service
metadata:
  name: kafka                # 백엔드가 kafka:9092 로 접속
  namespace: onebite
spec:
  selector: { app: kafka }
  ports:
    - { name: plaintext, port: 9092, targetPort: 9092 }
    - { name: controller, port: 9093, targetPort: 9093 }
