# 웹(Next.js standalone) — Service 는 80→3000 으로 노출.
# 주의: NEXT_PUBLIC_API_URL 은 "빌드 시" 번들에 인라인된다(런타임 env 아님).
#   → web 이미지를 빌드할 때 --build-arg NEXT_PUBLIC_API_URL=https://onebite.jgbak-land.com/api 로 굽는다.
#     (GitHub Actions Variables 의 NEXT_PUBLIC_API_URL 을 그 값으로 설정 — docs/deploy.md 2장)
# image = ghcr.io/parkjgn/... (GHCR 소문자 규칙).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: onebite
spec:
  replicas: 1
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      # 패키지가 private 이면 주석 해제(docs/deploy.md 4장). public 이면 불필요.
      # imagePullSecrets:
      #   - name: ghcr-pull
      containers:
        - name: web
          image: ghcr.io/parkjgn/onebite-web:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: web                 # 공용 ExternalName(onebite-client-service) 이 web.onebite.svc 로 연결
  namespace: onebite
spec:
  selector: { app: web }
  ports:
    - { port: 80, targetPort: 3000 }
