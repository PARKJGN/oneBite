# PostgreSQL — 단일 인스턴스 + PVC 영속. (백엔드 Flyway 가 스키마를 적용)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: onebite
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: onebite
spec:
  replicas: 1
  strategy:
    type: Recreate          # PVC 단일 마운트 — 롤링 금지
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - { name: POSTGRES_DB,   valueFrom: { configMapKeyRef: { name: onebite-config, key: POSTGRES_DB } } }
            - { name: POSTGRES_USER, valueFrom: { configMapKeyRef: { name: onebite-config, key: POSTGRES_USER } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: onebite-secrets, key: POSTGRES_PASSWORD } } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports:
            - containerPort: 5432
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "onebite"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "onebite"] }
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: postgres-data }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres            # 백엔드가 jdbc:postgresql://postgres:5432 로 접속
  namespace: onebite
spec:
  selector: { app: postgres }
  ports:
    - { port: 5432, targetPort: 5432 }
